<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Source Command Hub</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap");

      :root {
        --bg: #66c9ff;
        --panel: rgba(255, 255, 255, 0.92);
        --panel-ink: #0d1b2a;
        --ink: #0d1b2a;
        --ink-dark: #070f1a;
        --accent: #ff4fb6;
        --wire: rgba(9, 20, 38, 0.4);
        --wire-strong: rgba(9, 20, 38, 0.7);
        --shadow: 0 18px 40px rgba(5, 10, 20, 0.28);
        --bg-image: none;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #ffffff 0%, #e6f6ff 45%, #8fd3ff 100%);
        font-family: "Noto Sans JP", system-ui, sans-serif;
        color: var(--ink);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 48px;
        padding: 36px 0 96px;
      }

      .stage {
        width: min(960px, 96vw);
      }

      .screen {
        position: relative;
        aspect-ratio: 16 / 9;
        border-radius: 16px;
        overflow: hidden;
        background-image: linear-gradient(130deg, #cfe8ff 0%, #eaf4ff 45%, #ffffff 100%),
          radial-gradient(circle at 35% 40%, rgba(130, 170, 210, 0.25), transparent 55%),
          radial-gradient(circle at 70% 35%, rgba(255, 255, 255, 0.9), transparent 55%),
          var(--bg-image);
        background-size: cover;
        box-shadow: var(--shadow);
        border: 1px solid rgba(9, 20, 38, 0.2);
        isolation: isolate;
      }

      .screen::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, rgba(10, 24, 40, 0.25), rgba(255, 255, 255, 0.2));
        mix-blend-mode: normal;
        pointer-events: none;
        z-index: 2;
      }

      .screen::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.05),
          rgba(255, 255, 255, 0.05) 1px,
          transparent 1px,
          transparent 3px
        );
        opacity: 0.25;
        pointer-events: none;
        z-index: 4;
      }

      .portrait {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 65% 55%, rgba(245, 248, 252, 0.7) 0 20%, transparent 22%),
          radial-gradient(circle at 60% 55%, rgba(170, 200, 230, 0.5) 0 35%, transparent 38%),
          radial-gradient(circle at 75% 50%, rgba(20, 35, 55, 0.2) 0 35%, transparent 50%),
          linear-gradient(120deg, rgba(20, 50, 80, 0.35) 0%, rgba(82, 120, 160, 0.25) 48%, rgba(210, 225, 240, 0.2) 68%, rgba(240, 245, 250, 0.05) 100%);
        opacity: 0.6;
        mix-blend-mode: normal;
        pointer-events: none;
        z-index: 1;
      }

      .portrait::before {
        content: "";
        position: absolute;
        inset: -10% auto -10% -5%;
        width: 62%;
        background: linear-gradient(130deg, rgba(12, 30, 50, 0.5), rgba(45, 85, 130, 0.35) 55%, transparent 80%);
        clip-path: polygon(0 0, 100% 8%, 92% 45%, 100% 92%, 0 100%);
        opacity: 0.6;
      }

      .portrait::after {
        content: "";
        position: absolute;
        width: min(26vw, 170px);
        height: min(26vw, 170px);
        left: 56%;
        top: 42%;
        border-radius: 50%;
        border: 2px solid rgba(10, 18, 28, 0.35);
        background: radial-gradient(circle at 35% 35%, #f8fbff 0 18%, rgba(150, 180, 210, 0.65) 33%, rgba(60, 90, 130, 0.55) 55%, rgba(10, 18, 28, 0.5) 72%);
        box-shadow: inset 0 0 18px rgba(8, 14, 22, 0.35);
        opacity: 0.45;
      }

      .menu-btn {
        position: absolute;
        top: var(--y);
        left: var(--x);
        transform: translate(-50%, -50%);
        padding: 6px 22px 7px;
        font-family: "Orbitron", sans-serif;
        font-size: clamp(0.68rem, 1.4vw, 0.85rem);
        letter-spacing: 1px;
        color: #000;
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.55);
        text-transform: uppercase;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
        display: inline-flex;
        flex-direction: column;
        gap: 2px;
        align-items: center;
        justify-content: center;
        text-align: center;
        animation: float 3.8s ease-in-out infinite;
        animation-delay: var(--delay, 0s);
        z-index: 3;
      }

      .menu-btn:hover {
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
        border-color: rgba(0, 0, 0, 0.85);
      }

      .menu-btn:focus-visible {
        outline: 2px solid var(--wire-strong);
        outline-offset: 3px;
      }

      .menu-btn.light {
        background: #fff;
        color: #000;
        border: 1px solid rgba(0, 0, 0, 0.55);
      }

      .menu-btn .sub {
        display: block;
        font-family: "Noto Sans JP", sans-serif;
        font-size: 0.62rem;
        letter-spacing: 0.4px;
        text-transform: none;
        opacity: 0.9;
      }

      .panel {
        position: absolute;
        background: var(--panel);
        color: var(--panel-ink);
        border: 1px solid rgba(27, 39, 52, 0.2);
        border-radius: 4px;
        padding: 8px 12px;
        font-size: 0.8rem;
        box-shadow: 0 10px 24px rgba(10, 14, 20, 0.25);
        z-index: 5;
      }

      .panel.command {
        top: 18px;
        left: 18px;
        width: 190px;
        font-family: "Orbitron", sans-serif;
        text-transform: uppercase;
        letter-spacing: 1.2px;
      }

      .panel.command span {
        display: block;
        font-family: "Noto Sans JP", sans-serif;
        text-transform: none;
        letter-spacing: 0.2px;
        margin-top: 4px;
        font-size: 0.75rem;
      }

      .panel.corner {
        top: 18px;
        right: 18px;
        width: 155px;
        font-size: 0.75rem;
      }

      .panel.bottom-left {
        bottom: 18px;
        left: 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.75rem;
      }

      .panel.bottom-right {
        bottom: 18px;
        right: 18px;
        width: 110px;
        text-align: right;
        font-family: "Orbitron", sans-serif;
        font-size: 0.8rem;
      }

      .panel.bottom-right strong {
        display: block;
        font-size: 1.2rem;
      }

      .wires {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 2;
      }

      .wire {
        stroke: var(--wire);
        stroke-width: 2;
      }

      .wire.strong {
        stroke: var(--wire-strong);
        stroke-width: 2.6;
      }

      .node {
        fill: rgba(255, 255, 255, 0.85);
        stroke: rgba(10, 18, 28, 0.6);
        stroke-width: 1.5;
      }

      .content-section {
        width: min(960px, 96vw);
        background: rgba(10, 16, 24, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 24px 26px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(6px);
        scroll-margin-top: 24px;
      }

      .content-section h2 {
        margin: 0 0 10px;
        font-family: "Orbitron", sans-serif;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-size: 1.1rem;
      }

      .content-section p {
        margin: 0 0 18px;
        color: rgba(241, 244, 248, 0.8);
      }

      .content-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      .content-card {
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 0 12px rgba(7, 12, 18, 0.2);
      }

      .content-card span {
        display: block;
        font-family: "Orbitron", sans-serif;
        font-size: 0.68rem;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 6px;
      }

      .content-card small {
        color: rgba(241, 244, 248, 0.7);
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(-2px);
        }
        50% {
          transform: translate(-50%, -50%) translateY(6px);
        }
      }

      @media (max-width: 720px) {
        .panel.command,
        .panel.corner {
          transform: scale(0.9);
        }

        .menu-btn {
          font-size: 0.62rem;
          padding: 6px 14px;
        }

        .content-section {
          padding: 20px;
        }
      }
    </style>
  </head>

</html>
